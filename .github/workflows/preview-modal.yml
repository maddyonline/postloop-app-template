name: Preview (Modal)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      app_name:
        description: "Optional Modal app name override"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: modal-preview-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT }}
    outputs:
      modal_app_name: ${{ steps.names.outputs.modal_app_name }}
      preview_url: ${{ steps.preview.outputs.preview_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve preview app name
        id: names
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            APP_NAME="postloop-preview-pr-${{ github.event.pull_request.number }}"
          elif [ -n "${{ inputs.app_name }}" ]; then
            APP_NAME="${{ inputs.app_name }}"
          else
            APP_NAME="postloop-preview-manual-${{ github.run_id }}"
          fi

          echo "modal_app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "MODAL_APP_NAME=$APP_NAME" >> "$GITHUB_ENV"

      - name: Validate Modal credentials
        id: modal_auth
        shell: bash
        run: |
          if [ -z "${MODAL_TOKEN_ID:-}" ] || [ -z "${MODAL_TOKEN_SECRET:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Modal secrets are not configured. Skipping preview deploy."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Comment when preview is skipped (missing Modal secrets)
        if: github.event_name == 'pull_request' && steps.modal_auth.outputs.configured != 'true'
        uses: actions/github-script@v7
        env:
          MODAL_APP_NAME: ${{ steps.names.outputs.modal_app_name }}
        with:
          script: |
            const marker = "<!-- postloop-modal-preview -->";
            const body = [
              marker,
              "### Modal Preview",
              "",
              "- Status: skipped",
              `- Reason: missing \`MODAL_TOKEN_ID\` / \`MODAL_TOKEN_SECRET\` repo secrets`,
              `- App: \`${process.env.MODAL_APP_NAME}\``,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Set up Node.js
        if: steps.modal_auth.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle for preview deployment
        if: steps.modal_auth.outputs.configured == 'true'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
        run: |
          npm ci
          npm run build

      - name: Set up Python
        if: steps.modal_auth.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        if: steps.modal_auth.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy preview app
        id: deploy
        if: steps.modal_auth.outputs.configured == 'true'
        continue-on-error: true
        run: modal deploy modal_app.py --name "$MODAL_APP_NAME"

      - name: Resolve deploy state
        id: deploy_state
        if: steps.modal_auth.outputs.configured == 'true'
        shell: bash
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve preview URL
        id: preview
        if: steps.modal_auth.outputs.configured == 'true'
        shell: bash
        run: |
          set +e
          PREVIEW_URL="$(python .github/scripts/get_modal_preview_url.py 2>/tmp/preview_url.err)"
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            PREVIEW_URL=""
          fi
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Run Playwright smoke test against preview
        if: steps.modal_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.modal_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: modal-preview-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

      - name: Add or update PR preview comment
        if: github.event_name == 'pull_request' && steps.modal_auth.outputs.configured == 'true'
        uses: actions/github-script@v7
        env:
          MODAL_APP_NAME: ${{ steps.names.outputs.modal_app_name }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          DEPLOYED: ${{ steps.deploy_state.outputs.deployed }}
        with:
          script: |
            const marker = "<!-- postloop-modal-preview -->";
            const deployed = process.env.DEPLOYED === "true";
            const previewUrl = process.env.PREVIEW_URL || "";
            const body = [
              marker,
              "### Modal Preview",
              "",
              `- Status: ${deployed && previewUrl ? "ready" : "degraded"}`,
              `- App: \`${process.env.MODAL_APP_NAME}\``,
              `- URL: ${previewUrl || "(unavailable)"}`,
              deployed ? "- Deploy step: success" : "- Deploy step: failed (check workflow logs)",
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail workflow when deploy failed
        if: steps.modal_auth.outputs.configured == 'true' && steps.deploy_state.outputs.deployed != 'true'
        run: |
          echo "Modal deploy failed. See workflow logs and preview comment for context."
          exit 1

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: ${{ vars.MODAL_ENVIRONMENT }}
      MODAL_APP_NAME: postloop-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Validate Modal credentials
        id: modal_auth
        shell: bash
        run: |
          if [ -z "${MODAL_TOKEN_ID:-}" ] || [ -z "${MODAL_TOKEN_SECRET:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Modal secrets are not configured. Skipping cleanup."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.modal_auth.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        if: steps.modal_auth.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Stop preview app
        if: steps.modal_auth.outputs.configured == 'true'
        run: modal app stop "$MODAL_APP_NAME" || true
