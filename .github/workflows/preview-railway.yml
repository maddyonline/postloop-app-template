name: Preview (Railway)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Optional Railway environment name override"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: railway-preview-${{ github.event.pull_request.number || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_WEB_SERVICE: ${{ vars.RAILWAY_WEB_SERVICE }}
    outputs:
      preview_env: ${{ steps.ctx.outputs.preview_env }}
      preview_url: ${{ steps.preview.outputs.preview_url }}
      deployed: ${{ steps.deploy_state.outputs.deployed }}
      e2e: ${{ steps.e2e.outputs.e2e }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway configuration
        id: railway_auth
        shell: bash
        run: |
          missing=()
          if [ -z "${RAILWAY_TOKEN:-}" ]; then missing+=("RAILWAY_API_TOKEN secret"); fi
          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then missing+=("RAILWAY_PROJECT_ID variable"); fi
          if [ -z "${RAILWAY_WEB_SERVICE:-}" ]; then missing+=("RAILWAY_WEB_SERVICE variable"); fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            printf -v reason '%s, ' "${missing[@]}"
            reason="${reason%, }"
            echo "reason=${reason}" >> "$GITHUB_OUTPUT"
            echo "Missing Railway configuration: $reason"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "reason=" >> "$GITHUB_OUTPUT"

      - name: Comment when preview is skipped (missing Railway config)
        if: github.event_name == 'pull_request' && steps.railway_auth.outputs.configured != 'true'
        uses: actions/github-script@v7
        env:
          SKIP_REASON: ${{ steps.railway_auth.outputs.reason }}
        with:
          script: |
            const marker = "<!-- postloop-railway-preview -->";
            const body = [
              marker,
              "### Railway Preview",
              "",
              "- Status: skipped",
              `- Reason: ${process.env.SKIP_REASON || "missing Railway config"}`,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Set up Node.js
        if: steps.railway_auth.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Railway CLI
        if: steps.railway_auth.outputs.configured == 'true'
        run: |
          npm install -g @railway/cli
          railway --version

      - name: Resolve preview environment name
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PREVIEW_ENV="preview-pr-${{ github.event.pull_request.number }}"
          elif [ -n "${{ inputs.environment_name }}" ]; then
            PREVIEW_ENV="${{ inputs.environment_name }}"
          else
            PREVIEW_ENV="preview-manual-${{ github.run_id }}"
          fi

          echo "preview_env=$PREVIEW_ENV" >> "$GITHUB_OUTPUT"
          echo "PREVIEW_ENV=$PREVIEW_ENV" >> "$GITHUB_ENV"

      - name: Link Railway project
        if: steps.railway_auth.outputs.configured == 'true'
        run: railway link -p "$RAILWAY_PROJECT_ID"

      - name: Ensure preview environment exists
        if: steps.railway_auth.outputs.configured == 'true'
        shell: bash
        run: |
          if railway status --json | jq -e --arg env "$PREVIEW_ENV" '.environments.edges[].node.name | select(. == $env)' >/dev/null; then
            echo "Preview environment already exists: $PREVIEW_ENV"
          else
            railway environment new "$PREVIEW_ENV" --duplicate production
            echo "Created preview environment: $PREVIEW_ENV"
          fi

      - name: Deploy preview service
        id: deploy
        if: steps.railway_auth.outputs.configured == 'true'
        continue-on-error: true
        run: railway up -s "$RAILWAY_WEB_SERVICE" -e "$PREVIEW_ENV" -c

      - name: Resolve deploy state
        id: deploy_state
        if: steps.railway_auth.outputs.configured == 'true'
        shell: bash
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve preview URL
        id: preview
        if: steps.railway_auth.outputs.configured == 'true'
        shell: bash
        run: |
          RAW="$(railway variables -s "$RAILWAY_WEB_SERVICE" -e "$PREVIEW_ENV" --json 2>/dev/null || echo '{}')"
          DOMAIN="$(echo "$RAW" | jq -r '.RAILWAY_PUBLIC_DOMAIN // .RAILWAY_STATIC_URL // ""')"
          if [ -z "$DOMAIN" ]; then
            PREVIEW_URL=""
          elif [[ "$DOMAIN" == http://* || "$DOMAIN" == https://* ]]; then
            PREVIEW_URL="$DOMAIN"
          else
            PREVIEW_URL="https://$DOMAIN"
          fi
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Install frontend dependencies
        if: steps.railway_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        if: steps.railway_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke test against preview
        id: e2e_run
        if: steps.railway_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        continue-on-error: true
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}
        run: npm run test:e2e

      - name: Resolve e2e state
        id: e2e
        if: steps.railway_auth.outputs.configured == 'true'
        shell: bash
        run: |
          if [ "${{ steps.preview.outputs.preview_url }}" = "" ]; then
            echo "e2e=skipped" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.e2e_run.outcome }}" = "success" ]; then
            echo "e2e=passed" >> "$GITHUB_OUTPUT"
          else
            echo "e2e=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright report
        if: always() && steps.railway_auth.outputs.configured == 'true' && steps.preview.outputs.preview_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: railway-preview-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

      - name: Add or update PR preview comment
        if: github.event_name == 'pull_request' && steps.railway_auth.outputs.configured == 'true'
        uses: actions/github-script@v7
        env:
          PREVIEW_ENV: ${{ steps.ctx.outputs.preview_env }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          DEPLOYED: ${{ steps.deploy_state.outputs.deployed }}
          E2E: ${{ steps.e2e.outputs.e2e }}
        with:
          script: |
            const marker = "<!-- postloop-railway-preview -->";
            const deployed = process.env.DEPLOYED === "true";
            const previewUrl = process.env.PREVIEW_URL || "";
            const e2e = process.env.E2E || "skipped";
            const ready = deployed && previewUrl && e2e === "passed";
            const body = [
              marker,
              "### Railway Preview",
              "",
              `- Status: ${ready ? "ready" : "degraded"}`,
              `- Environment: \`${process.env.PREVIEW_ENV}\``,
              `- URL: ${previewUrl || "(unavailable)"}`,
              deployed ? "- Deploy step: success" : "- Deploy step: failed (check workflow logs)",
              `- Playwright smoke: ${e2e}`,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail workflow when deploy or smoke test fails
        if: steps.railway_auth.outputs.configured == 'true'
        shell: bash
        run: |
          if [ "${{ steps.deploy_state.outputs.deployed }}" != "true" ]; then
            echo "Railway deploy failed."
            exit 1
          fi
          if [ "${{ steps.preview.outputs.preview_url }}" = "" ]; then
            echo "Preview URL was not resolved."
            exit 1
          fi
          if [ "${{ steps.e2e.outputs.e2e }}" != "passed" ]; then
            echo "Playwright smoke test failed."
            exit 1
          fi

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_WEB_SERVICE: ${{ vars.RAILWAY_WEB_SERVICE }}
      PREVIEW_ENV: preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Validate Railway configuration
        id: railway_auth
        shell: bash
        run: |
          missing=()
          if [ -z "${RAILWAY_TOKEN:-}" ]; then missing+=("RAILWAY_API_TOKEN secret"); fi
          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then missing+=("RAILWAY_PROJECT_ID variable"); fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.railway_auth.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        if: steps.railway_auth.outputs.configured == 'true'
        run: npm install -g @railway/cli

      - name: Link Railway project
        if: steps.railway_auth.outputs.configured == 'true'
        run: railway link -p "$RAILWAY_PROJECT_ID"

      - name: Delete preview environment
        if: steps.railway_auth.outputs.configured == 'true'
        run: railway environment delete "$PREVIEW_ENV" -y || true
